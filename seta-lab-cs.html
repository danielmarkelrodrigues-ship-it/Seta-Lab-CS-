<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seta Lab — Central do CS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeece6;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --border: rgba(0,0,0,0.1);
      --border-md: rgba(0,0,0,0.18);
      --green: #1D9E75;
      --green-light: #E1F5EE;
      --green-dark: #085041;
      --blue: #378ADD;
      --blue-light: #E6F1FB;
      --blue-dark: #0C447C;
      --amber-light: #FAEEDA;
      --amber-dark: #854F0B;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg-secondary: #242422;
        --bg-tertiary: #2c2c2a;
        --text-primary: #f0ede6;
        --text-secondary: #b4b2a9;
        --text-tertiary: #888780;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.18);
        --green-light: #0a3328;
        --green-dark: #9FE1CB;
        --blue-light: #0c2340;
        --blue-dark: #85B7EB;
        --amber-light: #2e1e05;
        --amber-dark: #FAC775;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .topbar {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--green);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 16px; height: 16px; fill: #fff; }

    .logo-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .date-badge {
      font-size: 12px;
      color: var(--text-tertiary);
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 12px;
    }

    .main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .tab {
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text-tertiary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
      transition: color 0.15s;
    }

    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }

    .pane { display: none; }
    .pane.active { display: block; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-tertiary);
      margin: 1.25rem 0 0.65rem;
    }

    .clients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 8px;
      margin-bottom: 0.5rem;
    }

    .client-btn {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
    }

    .client-btn:hover {
      border-color: var(--border-md);
      color: var(--text-primary);
    }

    .client-btn.selected {
      border: 1.5px solid var(--green);
      background: var(--green-light);
      color: var(--green-dark);
      font-weight: 500;
    }

    .tipo-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tipo-btn {
      flex: 1;
      min-width: 140px;
      padding: 10px 14px;
      font-size: 13px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-secondary);
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .tipo-btn:hover { border-color: var(--border-md); color: var(--text-primary); }

    .tipo-btn.selected {
      border: 1.5px solid var(--blue);
      background: var(--blue-light);
      color: var(--blue-dark);
      font-weight: 500;
    }

    .form-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-bottom: 10px;
    }

    .form-row { margin-bottom: 14px; }
    .form-row:last-child { margin-bottom: 0; }

    .form-row label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    textarea, input[type=text], input[type=number] {
      width: 100%;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 13px;
      color: var(--text-primary);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus, input:focus {
      border-color: var(--border-md);
    }

    textarea { resize: vertical; min-height: 76px; line-height: 1.6; }

    .nums-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .nums-row label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }

    #trafego-fields { display: none; margin-top: 14px; }

    .generate-btn {
      width: 100%;
      padding: 13px;
      font-size: 14px;
      font-weight: 600;
      background: var(--green);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s;
    }

    .generate-btn:hover { background: #0F6E56; }

    .generate-btn:disabled {
      background: var(--bg-secondary);
      color: var(--text-tertiary);
      cursor: not-allowed;
      border: 0.5px solid var(--border);
    }

    .result-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      margin-top: 14px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .result-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .copy-btn {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 0.5px solid var(--border-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: var(--bg-secondary); }
    .copy-btn.copied { color: var(--green-dark); border-color: var(--green); background: var(--green-light); }

    .msg-preview {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.75;
      white-space: pre-wrap;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }

    .loading-area {
      text-align: center;
      padding: 24px;
      color: var(--text-tertiary);
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .pending-list { display: flex; flex-direction: column; gap: 6px; }

    .pending-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
    }

    .pi-name { color: var(--text-primary); font-weight: 500; }

    .status-done {
      font-size: 11px;
      color: var(--green-dark);
      background: var(--green-light);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .status-pending {
      font-size: 11px;
      color: var(--amber-dark);
      background: var(--amber-light);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .progress-bar-bg {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
    }

    .alert {
      background: var(--amber-light);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--amber-dark);
      margin-bottom: 14px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 7v10l8 5 8-5V7L12 2zm0 2.3l6 3.7v8.6l-6 3.7-6-3.7V8l6-3.7z"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Seta Lab</div>
      <div class="logo-sub">Central do CS</div>
    </div>
  </div>
  <div class="date-badge" id="todayDate"></div>
</div>

<div class="main">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('nova')">Nova mensagem</div>
    <div class="tab" onclick="switchTab('painel')">Painel do dia</div>
  </div>

  <div class="pane active" id="pane-nova">

    <div class="section-label">1. Selecione o cliente</div>
    <div class="clients-grid" id="clientsGrid"></div>

    <div class="section-label">2. Tipo de melhoria</div>
    <div class="tipo-row">
      <div class="tipo-btn" id="tipo-trafego" onclick="selectTipo('trafego')">Tráfego pago</div>
      <div class="tipo-btn" id="tipo-social" onclick="selectTipo('social')">Social media</div>
      <div class="tipo-btn" id="tipo-cardapio" onclick="selectTipo('cardapio')">Cardápio / operação</div>
    </div>

    <div class="section-label">3. Preencha o contexto</div>
    <div class="form-card">
      <div class="form-row">
        <label>O que foi feito / otimizado essa semana?</label>
        <textarea id="inputAcao" placeholder="Ex: criamos o monte seu combinho, ajustamos o criativo do anúncio principal, publicamos 3 reels com bastidores..."></textarea>
      </div>
      <div class="form-row">
        <label>Qual foi o resultado gerado?</label>
        <textarea id="inputResultado" placeholder="Ex: aumento de ticket médio, mais conversões, melhor engajamento nos últimos 7 dias..."></textarea>
      </div>
      <div id="trafego-fields">
        <div class="section-label" style="margin-top:4px">Dados de investimento (opcional)</div>
        <div class="nums-row">
          <div>
            <label>Investido (R$)</label>
            <input type="number" id="inputInvestido" placeholder="168">
          </div>
          <div>
            <label>Retorno em vendas (R$)</label>
            <input type="number" id="inputRetorno" placeholder="688">
          </div>
          <div>
            <label>Meta de retorno (R$)</label>
            <input type="number" id="inputMeta" placeholder="1750">
          </div>
        </div>
      </div>
      <div class="form-row" style="margin-top:14px">
        <label>Próximo passo / o que vem pela frente</label>
        <input type="text" id="inputProximo" placeholder="Ex: vamos testar um novo criativo focado no combo duplo">
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generateMessage()">Gerar mensagem com Claude</button>

    <div id="resultArea"></div>
  </div>

  <div class="pane" id="pane-painel">
    <div class="section-label">Progresso de hoje</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 de 16 clientes contatados</div>

    <div class="section-label" style="margin-top:1.25rem">Status dos clientes</div>
    <div class="pending-list" id="pendingList"></div>
  </div>
</div>

<script>
const CLIENTS = [
  'Divino Mineiro','Hebrom','Lanche dos Guri','Fogo no Disco',
  'Pizzaria Campeã','Cafezinho','Imperial / Atillio','Forno Napoletano',
  'El Patron','Hamburgueria Goiana','Johnys','Parmegiamo',
  'Quentinhas','Restaurante Grill','Varanda Beer','Costelito'
];

const COMPANY = 'Seta Lab - Administradora de Restaurantes';
let selectedClient = null;
let selectedTipo = null;
const doneToday = {};

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'nova' && i === 0) || (tab === 'painel' && i === 1));
  });
  document.getElementById('pane-nova').classList.toggle('active', tab === 'nova');
  document.getElementById('pane-painel').classList.toggle('active', tab === 'painel');
  if (tab === 'painel') renderPainel();
}

function renderClients() {
  document.getElementById('clientsGrid').innerHTML = CLIENTS.map(c =>
    `<div class="client-btn${selectedClient === c ? ' selected' : ''}" onclick="selectClient('${c.replace(/'/g,"\\'")}'">${c}</div>`
  ).join('');
}

function selectClient(c) {
  selectedClient = c;
  renderClients();
}

function selectTipo(t) {
  selectedTipo = t;
  ['trafego','social','cardapio'].forEach(x =>
    document.getElementById('tipo-' + x).classList.toggle('selected', x === t)
  );
  document.getElementById('trafego-fields').style.display = t === 'trafego' ? 'block' : 'none';
}

function renderPainel() {
  const done = Object.values(doneToday).filter(Boolean).length;
  const total = CLIENTS.length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} de ${total} clientes contatados hoje`;

  document.getElementById('pendingList').innerHTML = CLIENTS.map(c =>
    `<div class="pending-item">
      <span class="pi-name">${c}</span>
      <span class="${doneToday[c] ? 'status-done' : 'status-pending'}">${doneToday[c] ? 'Mensagem enviada' : 'Pendente'}</span>
    </div>`
  ).join('');
}

async function generateMessage() {
  if (!selectedClient) { showAlert('Selecione um cliente primeiro.'); return; }
  if (!selectedTipo) { showAlert('Selecione o tipo de melhoria.'); return; }

  const acao = document.getElementById('inputAcao').value.trim();
  const resultado = document.getElementById('inputResultado').value.trim();
  if (!acao || !resultado) { showAlert('Preencha o que foi feito e o resultado.'); return; }

  const investido = document.getElementById('inputInvestido').value;
  const retorno = document.getElementById('inputRetorno').value;
  const meta = document.getElementById('inputMeta').value;
  const proximo = document.getElementById('inputProximo').value.trim();

  const tipoLabel = { trafego: 'tráfego pago', social: 'social media', cardapio: 'cardápio / operação' }[selectedTipo];

  let dadosFinanceiros = '';
  if (selectedTipo === 'trafego' && investido && retorno) {
    dadosFinanceiros = `Dados financeiros: investimos R$${Number(investido).toLocaleString('pt-BR')} e o retorno em vendas foi de R$${Number(retorno).toLocaleString('pt-BR')}.${meta ? ` Nossa meta de retorno é R$${Number(meta).toLocaleString('pt-BR')}.` : ''}`;
  }

  const prompt = `Você é o assistente de comunicação da ${COMPANY}. Redija uma mensagem de WhatsApp para o cliente "${selectedClient}" sobre uma melhoria recente na área de ${tipoLabel}.

Diretrizes:
- Tom: caloroso, direto e próximo — como um parceiro de negócio que se importa com o resultado
- Linguagem simples, sem jargão técnico
- Mostre o que foi feito, o resultado concreto e o que vem a seguir
- Máximo 4 parágrafos curtos
- Use no máximo 2 emojis, somente se fizer sentido
- Não inclua saudação genérica como "Olá, tudo bem?"
- Comece direto com a novidade ou ação tomada

Informações:
- O que foi feito: ${acao}
- Resultado gerado: ${resultado}
${dadosFinanceiros ? '- ' + dadosFinanceiros : ''}
${proximo ? '- Próximo passo: ' + proximo : ''}

Escreva apenas a mensagem final, sem introdução, sem explicação, sem aspas.`;

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = 'Gerando mensagem...';

  document.getElementById('resultArea').innerHTML = `
    <div class="result-card">
      <div class="loading-area"><div class="spinner"></div>Claude está escrevendo a mensagem para ${selectedClient}...</div>
    </div>`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const msg = data.content?.map(b => b.text || '').join('').trim() || 'Erro ao gerar mensagem.';

    doneToday[selectedClient] = true;

    document.getElementById('resultArea').innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div class="result-title">Mensagem para ${selectedClient}</div>
          <button class="copy-btn" id="copyBtn" onclick="copyMsg()">Copiar</button>
        </div>
        <div class="msg-preview" id="msgText">${msg}</div>
      </div>`;

  } catch(e) {
    document.getElementById('resultArea').innerHTML = `
      <div class="result-card">
        <div class="loading-area">Erro ao conectar com Claude. Verifique sua conexão e tente novamente.</div>
      </div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Gerar mensagem com Claude';
}

function copyMsg() {
  const text = document.getElementById('msgText')?.innerText;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2500);
  });
}

function showAlert(msg) {
  const existing = document.querySelector('.alert');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'alert';
  el.textContent = msg;
  document.getElementById('pane-nova').insertBefore(el, document.getElementById('generateBtn'));
  setTimeout(() => el.remove(), 3000);
}

const today = new Date();
document.getElementById('todayDate').textContent = today.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

renderClients();
</script>
</body>
</html>
